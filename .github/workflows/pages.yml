name: Deploy GitHub Pages

# Hinweis: Die github-pages-Umgebung erlaubt Deployments nur vom
# Default-Branch des Repos (aktuell claude/financial-closing-bpmn-design-5qrro6).
# Wird der Default-Branch auf main umgestellt, hier den Trigger anpassen.
on:
  push:
    branches: [claude/financial-closing-bpmn-design-5qrro6]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
