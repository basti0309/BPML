name: Deploy GitHub Pages

# Hinweis: Die github-pages-Umgebung erlaubt Deployments nur vom
# Default-Branch des Repos. Beide Branches sind als Trigger eingetragen,
# damit das Deployment unabhängig davon funktioniert, welcher davon
# der Default ist.
on:
  push:
    branches: [main, claude/financial-closing-bpmn-design-5qrro6]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
