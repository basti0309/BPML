<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BPML – Single-Entity Closings & AFC Design</title>
  <link rel="stylesheet" href="css/diagram-js.css" />
  <link rel="stylesheet" href="css/bpmn-js.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">📋</span>
      <div>
        <h1 id="app-title">BPML Single-Entity Closings</h1>
        <span id="app-client" class="muted"></span>
      </div>
    </div>
    <nav class="tabs" id="nav-tabs">
      <button data-view="table" class="active">BPML Table</button>
      <button data-view="matrix">Country Matrix</button>
      <button data-view="calendar">Closing Calendar</button>
      <button data-view="bpmn">Process Flow (BPMN)</button>
      <button data-view="afc">AFC Design</button>
    </nav>
    <div class="toolbar">
      <button id="btn-undo" title="Undo (Ctrl+Z)" disabled>↶</button>
      <button id="btn-redo" title="Redo (Ctrl+Shift+Z)" disabled>↷</button>
      <button id="btn-editor" title="Editor name (for change log & comments)">👤</button>
      <button id="btn-countries" title="Manage countries (add / delete)">🌐</button>
      <button id="btn-import-excel" title="Import Excel (.xlsx) – also loads states exported by this app">⬆ Excel</button>
      <button id="btn-import-json" title="Import JSON snapshot">⬆ JSON</button>
      <button id="btn-export-excel" title="Export formatted Excel workbook (6 sheets)">⬇ Excel</button>
      <button id="btn-export-json" title="Export current state as JSON">⬇ JSON</button>
      <button id="btn-backups" title="Backups & restore points">🗄</button>
      <button id="btn-log" title="Show change log">🕘</button>
      <button id="btn-reset" title="Reset to seed data (a backup is made first)" class="danger">↺</button>
    </div>
  </header>

  <main id="view-root"></main>

  <div id="drawer" class="drawer hidden">
    <div class="drawer-inner">
      <button class="drawer-close" id="drawer-close">✕</button>
      <div id="drawer-content"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <input type="file" id="file-excel" accept=".xlsx,.xls,.xlsm,.csv,.ods" hidden />
  <input type="file" id="file-json" accept=".json" hidden />

  <script src="js/vendor/xlsx.full.min.js"></script>
  <script src="js/vendor/exceljs.min.js"></script>
  <script src="js/vendor/bpmn-navigated-viewer.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
